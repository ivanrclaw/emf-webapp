# fly.toml — emf-webapp
app = "emf-webapp"
primary_region = "yyz"

[build]
  builder = "heroku/buildpacks:20"

[build.env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  source = "emfdata"
  destination = "/app/data"
